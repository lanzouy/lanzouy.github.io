<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanzouy - 云端文件库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 蓝奏云核心色彩 */
            --primary-blue: #1890ff;
            --primary-blue-hover: #0077e6;
            --primary-blue-active: #005bb8;
            --primary-blue-light: #e6f7ff;
            
            /* 日间模式 */
            --light-bg: #f5f7fa;
            --light-card: #ffffff;
            --light-border: #e8e8e8;
            --light-text: #333333;
            --light-text-secondary: #666666;
            --light-hover-bg: #f9f9f9;
            
            /* 通用变量 */
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
            --border-radius: 8px;
            --transition-speed: 0.2s;
        }
        
        /* 夜间模式变量 */
        .dark-mode {
            /* 夜间模式配色 */
            --light-bg: #0f1419;
            --light-card: #1a1f26;
            --light-border: #2c3138;
            --light-text: #e8e8e8;
            --light-text-secondary: #a0a0a0;
            --light-hover-bg: #2a2f36;
            
            --primary-blue: #1890ff;
            --primary-blue-hover: #40a9ff;
            --primary-blue-active: #096dd9;
            --primary-blue-light: rgba(24, 144, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        .app-header {
            background: var(--light-card);
            border-radius: var(--border-radius);
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-left: 4px solid var(--primary-blue);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-left i {
            font-size: 28px;
            color: var(--primary-blue);
        }
        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--light-text);
            margin-bottom: 4px;
        }
        .header-title p {
            color: var(--light-text-secondary);
            font-size: 14px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 主题切换按钮 */
        .theme-toggle {
            background: var(--primary-blue-light);
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all var(--transition-speed);
        }
        .theme-toggle:hover {
            background: var(--primary-blue);
            color: white;
        }
        
        /* 控制栏 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: var(--light-card);
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            flex-wrap: wrap;
            gap: 15px;
        }
        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--light-border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--light-bg);
            color: var(--light-text);
            transition: all var(--transition-speed);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light-text-secondary);
        }
        
        /* 统计信息 */
        .stats-info {
            display: flex;
            gap: 20px;
            color: var(--light-text-secondary);
            font-size: 14px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-badge {
            background: var(--primary-blue-light);
            color: var(--primary-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        /* 面包屑导航 */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: var(--light-card);
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            font-size: 14px;
            flex-wrap: wrap;
        }
        .breadcrumb a {
            color: var(--primary-blue);
            text-decoration: none;
            transition: color var(--transition-speed);
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .breadcrumb-separator {
            color: var(--light-text-secondary);
        }
        
        /* 主文件区域 */
        .files-card {
            background: var(--light-card);
            border-radius: var(--border-radius);
            padding: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--light-border);
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--light-text);
        }
        
        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-speed);
            font-weight: 500;
        }
        .btn-primary {
            background: var(--primary-blue);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-blue-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--light-border);
            color: var(--light-text);
        }
        .btn-outline:hover {
            background: var(--light-hover-bg);
        }
        
        /* 文件表格 */
        .files-content {
            padding: 0 24px 24px;
        }
        .files-table {
            width: 100%;
            border-collapse: collapse;
        }
        .files-table th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--light-text-secondary);
            border-bottom: 2px solid var(--light-border);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .files-table th:hover {
            color: var(--primary-blue);
            background: var(--light-hover-bg);
        }
        .files-table td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--light-border);
            vertical-align: middle;
        }
        .files-table tbody tr {
            transition: background-color var(--transition-speed);
        }
        .files-table tbody tr:hover {
            background: var(--light-hover-bg);
        }
        
        /* 文件列表项 */
        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .file-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .file-icon-wrapper.folder {
            background: #fff7e6;
            color: #ffa940;
        }
        .file-icon-wrapper.file {
            background: #e6f7ff;
            color: var(--primary-blue);
        }
        .file-icon-wrapper.back {
            background: #f6f6f6;
            color: #666;
        }
        .dark-mode .file-icon-wrapper.folder {
            background: rgba(255, 167, 64, 0.1);
        }
        .dark-mode .file-icon-wrapper.file {
            background: rgba(24, 144, 255, 0.1);
        }
        .dark-mode .file-icon-wrapper.back {
            background: rgba(102, 102, 102, 0.1);
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            font-weight: 500;
            color: var(--light-text);
            text-decoration: none;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-name:hover {
            color: var(--primary-blue);
            text-decoration: underline;
        }
        
        /* 状态 */
        .loading, .error, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--light-text-secondary);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light-border);
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--light-text-secondary);
            font-size: 13px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .app-header { padding: 20px; flex-direction: column; align-items: flex-start; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .files-content { padding: 0 15px 15px; }
            .files-table { display: block; overflow-x: auto; }
            .files-table th, .files-table td { padding: 12px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-left">
                <i class="fas fa-cloud-arrow-up"></i>
                <div class="header-title">
                    <h1>Lanzouy 云盘</h1>
                    <p>基于 GitHub Pages 的高速文件托管服务</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" id="refresh-btn">
                    <i class="fas fa-redo"></i> 刷新
                </button>
                <button class="theme-toggle" id="theme-toggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
        
        <div class="control-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="输入文件名或类型进行搜索...">
            </div>
            <div class="stats-info">
                <div class="stat-item">
                    <i class="fas fa-file"></i>
                    <span>文件: <span class="stat-badge" id="file-count">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-folder"></i>
                    <span>文件夹: <span class="stat-badge" id="folder-count">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-hdd"></i>
                    <span>总大小: <span class="stat-badge" id="total-size">0 B</span></span>
                </div>
            </div>
        </div>
        
        <nav class="breadcrumb" id="breadcrumb">
            <a href="javascript:void(0)" onclick="loadFiles('')">全部文件</a>
        </nav>
        
        <main class="files-card">
            <div class="files-header">
                <h2 class="section-title" id="current-path-title">全部文件</h2>
                <button class="btn btn-primary" onclick="loadFiles('')">
                    <i class="fas fa-home"></i> 返回根目录
                </button>
            </div>
            
            <div class="files-content" id="content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载文件列表...</p>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>Powered by GitHub Pages & Lanzouy | © 2023-2024 | 数据来自 GitHub API</p>
        </footer>
    </div>

    <script>
        const GITHUB_USER = 'lanzouy';
        const GITHUB_REPO = 'lanzouy.github.io';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

        const FILE_ICONS = {
            'zip': 'file-archive', 'rar': 'file-archive', '7z': 'file-archive', 
            'gz': 'file-archive', 'tar': 'file-archive', 'pdf': 'file-pdf', 
            'doc': 'file-word', 'docx': 'file-word', 'txt': 'file-lines', 
            'md': 'markdown', 'xls': 'file-excel', 'xlsx': 'file-excel', 
            'ppt': 'file-powerpoint', 'pptx': 'file-powerpoint', 'jpg': 'file-image', 
            'jpeg': 'file-image', 'png': 'file-image', 'gif': 'file-image', 
            'bmp': 'file-image', 'svg': 'file-image', 'webp': 'file-image', 
            'ico': 'file-image', 'mp4': 'file-video', 'avi': 'file-video', 
            'mkv': 'file-video', 'mov': 'file-video', 'wmv': 'file-video', 
            'flv': 'file-video', 'mp3': 'file-audio', 'wav': 'file-audio', 
            'flac': 'file-audio', 'aac': 'file-audio', 'ogg': 'file-audio', 
            'js': 'file-code', 'ts': 'file-code', 'py': 'file-code', 
            'java': 'file-code', 'cpp': 'file-code', 'c': 'file-code', 
            'html': 'file-code', 'css': 'file-code', 'json': 'file-code', 
            'xml': 'file-code', 'exe': 'gear', 'msi': 'gear', 'dmg': 'apple', 
            'apk': 'mobile', 'ipa': 'mobile', 'iso': 'compact-disc', 
            'img': 'compact-disc'
        };

        let currentPath = '';
        let allItems = [];
        let currentSort = { column: 'name', order: 'asc' };

        async function loadFiles(path = '') {
            const contentEl = document.getElementById('content');
            const fileCountEl = document.getElementById('file-count');
            const folderCountEl = document.getElementById('folder-count');
            const totalSizeEl = document.getElementById('total-size');
            const pathTitleEl = document.getElementById('current-path-title');
            const breadcrumbEl = document.getElementById('breadcrumb');
            
            currentPath = path;
            
            try {
                contentEl.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载文件列表...</p>
                    </div>
                `;
                
                updatePageTitle(currentPath);
                updateBreadcrumb(currentPath, breadcrumbEl);
                
                const apiUrl = currentPath ? 
                    `${API_BASE}${encodeURIComponent(currentPath)}` : 
                    API_BASE;
                
                const response = await fetch(apiUrl, {
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'User-Agent': 'lanzouy-cloud'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`GitHub API 请求失败: ${response.status}`);
                }
                
                const items = await response.json();
                allItems = items;

                const files = items.filter(item => 
                    item.type === 'file' && 
                    !item.name.startsWith('.') && 
                    item.name !== 'index.html'
                );
                const folders = items.filter(item => 
                    item.type === 'dir' && 
                    !item.name.startsWith('.')
                );
                
                const fileCount = files.length;
                const folderCount = folders.length;
                const totalSize = files.reduce((sum, file) => sum + (file.size || 0), 0);
                
                fileCountEl.textContent = fileCount;
                folderCountEl.textContent = folderCount;
                totalSizeEl.textContent = formatFileSize(totalSize);
                
                renderFileTable(files, folders, contentEl);
                
            } catch (error) {
                contentEl.innerHTML = `
                    <div class="error">
                        <p><i class="fas fa-exclamation-triangle"></i> 加载失败</p>
                        <p style="margin-top: 10px; font-size: 14px;">${error.message}</p>
                        <button onclick="loadFiles(currentPath)" class="btn btn-primary" style="margin-top: 15px;">
                            <i class="fas fa-redo"></i> 重试
                        </button>
                    </div>
                `;
            }
        }
        
        function renderFileTable(files, folders, contentEl) {
            if (files.length === 0 && folders.length === 0) {
                contentEl.innerHTML = '<div class="empty"><p>此文件夹为空</p></div>';
                return;
            }
            
            let html = `
                <table class="files-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">名称 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable('size')">大小 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable('date')">更新时间 <i class="fas fa-sort"></i></th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            if (currentPath) {
                const parentPath = getParentPath(currentPath);
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper back">
                                    <i class="fas fa-level-up-alt"></i>
                                </div>
                                <div class="file-info">
                                    <a href="javascript:void(0)" onclick="loadFiles('${parentPath}')" class="file-name">返回上级目录</a>
                                </div>
                            </div>
                        </td>
                        <td>-</td>
                        <td>-</td>
                        <td>
                            <button onclick="loadFiles('${parentPath}')" class="btn btn-outline">
                                <i class="fas fa-folder-open"></i> 打开
                            </button>
                        </td>
                    </tr>
                `;
            }
            
            folders.forEach(folder => {
                const date = formatDate(folder.updated_at || folder.created_at);
                const folderPath = currentPath ? `${currentPath}/${folder.name}` : folder.name;
                
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper folder">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <div class="file-info">
                                    <a href="javascript:void(0)" onclick="loadFiles('${folderPath}')" class="file-name">${folder.name}</a>
                                </div>
                            </div>
                        </td>
                        <td>-</td>
                        <td>${date}</td>
                        <td>
                            <button onclick="loadFiles('${folderPath}')" class="btn btn-outline">
                                <i class="fas fa-folder-open"></i> 打开
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            files.forEach(file => {
                const iconClass = getFileIcon(file.name);
                const size = formatFileSize(file.size);
                const date = formatDate(file.updated_at || file.created_at);
                const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                const downloadUrl = `/${filePath}`;
                
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper file">
                                    <i class="fas fa-${iconClass}"></i>
                                </div>
                                <div class="file-info">
                                    <a href="${downloadUrl}" class="file-name" target="_blank">${file.name}</a>
                                </div>
                            </div>
                        </td>
                        <td>${size}</td>
                        <td>${date}</td>
                        <td>
                            <a href="${downloadUrl}" class="btn btn-primary" download="${file.name}">
                                <i class="fas fa-download"></i> 下载
                            </a>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            contentEl.innerHTML = html;
        }
        
        function getFileIcon(filename) {
            const ext = filename.toLowerCase().split('.').pop();
            return FILE_ICONS[ext] || 'file';
        }
        
        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return '-';
            }
        }
        
        function getParentPath(path) {
            if (!path) return '';
            const parts = path.split('/');
            parts.pop();
            return parts.join('/');
        }
        
        function updatePageTitle(path) {
            const pathTitleEl = document.getElementById('current-path-title');
            if (pathTitleEl) {
                pathTitleEl.textContent = path ? `当前位置: /${path}` : '全部文件';
            }
        }
        
        function updateBreadcrumb(path, breadcrumbEl) {
            if (!breadcrumbEl) return;
            
            let html = '<a href="javascript:void(0)" onclick="loadFiles(\'\')">全部文件</a>';
            
            if (path) {
                const parts = path.split('/');
                let currentPath = '';
                
                parts.forEach((part, index) => {
                    currentPath = currentPath ? `${currentPath}/${part}` : part;
                    html += `<span class="breadcrumb-separator">/</span>`;
                    if (index === parts.length - 1) {
                        html += `<span>${part}</span>`;
                    } else {
                        html += `<a href="javascript:void(0)" onclick="loadFiles('${currentPath}')">${part}</a>`;
                    }
                });
            }
            
            breadcrumbEl.innerHTML = html;
        }
        
        function sortTable(column) {
            const tbody = document.querySelector('.files-table tbody');
            if (!tbody) return;
            
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const aVal = getCellValue(a, column);
                const bVal = getCellValue(b, column);
                
                let comparison = 0;
                if (column === 'size') {
                    const aSize = aVal === '-' ? -1 : parseFloat(aVal);
                    const bSize = bVal === '-' ? -1 : parseFloat(bVal);
                    comparison = aSize - bSize;
                } else if (column === 'date') {
                    const aDate = aVal === '-' ? new Date(0) : new Date(aVal);
                    const bDate = bVal === '-' ? new Date(0) : new Date(bVal);
                    comparison = aDate - bDate;
                } else {
                    comparison = aVal.localeCompare(bVal);
                }
                
                return currentSort.order === 'asc' ? comparison : -comparison;
            });
            
            rows.forEach(row => tbody.appendChild(row));
            
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        }
        
        function getCellValue(row, column) {
            const cellIndex = { name: 0, size: 1, date: 2 }[column];
            const cell = row.cells[cellIndex];
            if (!cell) return '';
            const fileLink = cell.querySelector('.file-name');
            return fileLink ? fileLink.textContent.trim() : cell.textContent.trim();
        }
        
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            let searchTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = this.value.trim().toLowerCase();
                    const rows = document.querySelectorAll('.files-table tbody tr');
                    
                    if (term === '') {
                        rows.forEach(row => row.style.display = '');
                        return;
                    }
                    
                    rows.forEach(row => {
                        const nameCell = row.querySelector('.file-name');
                        if (nameCell) {
                            const fileName = nameCell.textContent.toLowerCase();
                            row.style.display = fileName.includes(term) ? '' : 'none';
                        }
                    });
                }, 300);
            });
        }
        
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle.querySelector('i');
            
            const savedTheme = localStorage.getItem('lanzouy-theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeIcon.className = 'fas fa-sun';
            }
            
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                
                if (document.body.classList.contains('dark-mode')) {
                    themeIcon.className = 'fas fa-sun';
                    localStorage.setItem('lanzouy-theme', 'dark');
                } else {
                    themeIcon.className = 'fas fa-moon';
                    localStorage.setItem('lanzouy-theme', 'light');
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadFiles('');
            setupSearch();
            initTheme();
            
            document.getElementById('refresh-btn').addEventListener('click', () => loadFiles(currentPath));
        });
    </script>
</body>
</html>
