<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝奏云 Kz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1890ff;
            --primary-blue-hover: #0077e6;
            --primary-blue-light: #e6f7ff;
            --light-bg: #f5f7fa;
            --light-card: #ffffff;
            --light-border: #e8e8e8;
            --light-text: #333333;
            --light-text-secondary: #666666;
            --light-hover-bg: #f9f9f9;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
            --border-radius: 8px;
            --transition-speed: 0.2s;
        }
        .dark-mode {
            --light-bg: #0f1419;
            --light-card: #1a1f26;
            --light-border: #2c3138;
            --light-text: #e8e8e8;
            --light-text-secondary: #a0a0a0;
            --light-hover-bg: #2a2f36;
            --primary-blue: #1890ff;
            --primary-blue-hover: #40a9ff;
            --primary-blue-light: rgba(24, 144, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .app-header {
            background: var(--light-card);
            border-radius: var(--border-radius);
            padding: 25px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-left: 4px solid var(--primary-blue);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left i { font-size: 28px; color: var(--primary-blue); }
        .header-title h1 { font-size: 24px; font-weight: 600; color: var(--light-text); margin-bottom: 4px; }
        .header-title p { color: var(--light-text-secondary); font-size: 14px; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .theme-toggle {
            background: var(--primary-blue-light);
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all var(--transition-speed);
        }
        .theme-toggle:hover { background: var(--primary-blue); color: white; }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: var(--light-card);
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            flex-wrap: wrap;
            gap: 15px;
        }
        .search-box { position: relative; flex: 1; max-width: 400px; }
        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--light-border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--light-bg);
            color: var(--light-text);
            transition: all var(--transition-speed);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--light-text-secondary); }
        .stats-info { display: flex; gap: 20px; color: var(--light-text-secondary); font-size: 14px; }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-badge { background: var(--primary-blue-light); color: var(--primary-blue); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: var(--light-card);
            border-radius: var(--border-radius);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            font-size: 14px;
            flex-wrap: wrap;
        }
        .breadcrumb a { color: var(--primary-blue); text-decoration: none; transition: color var(--transition-speed); }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-separator { color: var(--light-text-secondary); }
        .files-card { background: var(--light-card); border-radius: var(--border-radius); padding: 0; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); margin-bottom: 20px; overflow: hidden; }
        .files-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--light-border); }
        .section-title { font-size: 18px; font-weight: 600; color: var(--light-text); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-speed);
            font-weight: 500;
        }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-primary:hover { background: var(--primary-blue-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--light-border); color: var(--light-text); }
        .btn-outline:hover { background: var(--light-hover-bg); }
        .files-content { padding: 0 24px 24px; }
        .files-table { width: 100%; border-collapse: collapse; }
        .files-table th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--light-text-secondary);
            border-bottom: 2px solid var(--light-border);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .files-table th:hover { color: var(--primary-blue); background: var(--light-hover-bg); }
        .files-table td { padding: 16px 12px; border-bottom: 1px solid var(--light-border); vertical-align: middle; }
        .files-table tbody tr { transition: background-color var(--transition-speed); }
        .files-table tbody tr:hover { background: var(--light-hover-bg); }
        .file-item { display: flex; align-items: center; gap: 12px; }
        .file-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .file-icon-wrapper.folder { background: #fff7e6; color: #ffa940; }
        .file-icon-wrapper.file { background: #e6f7ff; color: var(--primary-blue); }
        .file-icon-wrapper.back { background: #f6f6f6; color: #666; }
        .dark-mode .file-icon-wrapper.folder { background: rgba(255, 167, 64, 0.1); }
        .dark-mode .file-icon-wrapper.file { background: rgba(24, 144, 255, 0.1); }
        .dark-mode .file-icon-wrapper.back { background: rgba(102, 102, 102, 0.1); }
        .file-info { flex: 1; min-width: 0; }
        .file-name {
            font-weight: 500;
            color: var(--light-text);
            text-decoration: none;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-name:hover { color: var(--primary-blue); text-decoration: underline; }
        .loading, .error, .empty { text-align: center; padding: 60px 20px; color: var(--light-text-secondary); }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light-border);
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { text-align: center; padding: 20px; color: var(--light-text-secondary); font-size: 13px; }
        .search-results-container {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--light-card);
            border: 1px solid var(--light-border);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
            margin-top: 5px;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--light-border);
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-result-item:hover { background: var(--light-hover-bg); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .search-result-info { flex: 1; min-width: 0; }
        .search-result-name { font-weight: 500; color: var(--light-text); margin-bottom: 4px; }
        .search-result-path { font-size: 12px; color: var(--light-text-secondary); }
        .search-result-size { font-size: 12px; color: var(--light-text-secondary); white-space: nowrap; margin-left: 10px; }
        .highlight { background: #fff566; padding: 1px 3px; border-radius: 3px; }
        .search-empty { padding: 30px 20px; text-align: center; color: var(--light-text-secondary); }
        .upload-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--light-card);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .upload-area {
            border: 2px dashed var(--light-border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover { border-color: var(--primary-blue); background: var(--primary-blue-light); }
        .upload-area i { font-size: 48px; color: var(--primary-blue); margin-bottom: 15px; }
        .progress-bar {
            height: 6px;
            background: var(--light-border);
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s; }
        @media (max-width: 768px) {
            .container { padding: 15px; }
            .app-header { padding: 20px; flex-direction: column; align-items: flex-start; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .files-content { padding: 0 15px 15px; }
            .files-table { display: block; overflow-x: auto; }
            .files-table th, .files-table td { padding: 12px 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-left">
                <i class="fas fa-cloud-arrow-up"></i>
                <div class="header-title">
                    <h1>蓝奏云 Kz</h1>
                    <p>基于 GitHub Pages 的高速文件托管服务</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="showUploadModal()">
                    <i class="fas fa-upload"></i> 上传
                </button>
                <button class="btn btn-outline" id="refresh-btn">
                    <i class="fas fa-redo"></i> 刷新
                </button>
                <button class="btn btn-primary" onclick="githubLogin()" id="login-btn">
                    <i class="fab fa-github"></i> 授权登录
                </button>
                <button class="theme-toggle" id="theme-toggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
        
        <div class="control-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="搜索全仓库文件...">
                <div class="search-results-container" id="search-results-container" style="display: none;"></div>
            </div>
            <div class="stats-info">
                <div class="stat-item">
                    <i class="fas fa-file"></i>
                    <span>文件: <span class="stat-badge" id="file-count">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-folder"></i>
                    <span>文件夹: <span class="stat-badge" id="folder-count">0</span></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-hdd"></i>
                    <span>大小: <span class="stat-badge" id="total-size">0 B</span></span>
                </div>
            </div>
        </div>
        
        <nav class="breadcrumb" id="breadcrumb">
            <a href="javascript:void(0)" onclick="loadFiles('')">全部文件</a>
        </nav>
        
        <main class="files-card">
            <div class="files-header">
                <h2 class="section-title" id="current-path-title">全部文件</h2>
                <button class="btn btn-primary" onclick="loadFiles('')">
                    <i class="fas fa-home"></i> 返回根目录
                </button>
            </div>
            
            <div class="files-content" id="content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载文件列表...</p>
                </div>
            </div>
        </main>
        
        <footer class="footer">
            <p>Powered by GitHub Pages & Lanzouy | © 2023-2024 | 数据来自 GitHub API</p>
        </footer>
    </div>

    <!-- 上传模态框 -->
    <div class="upload-modal" id="upload-modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: var(--light-text);">上传文件</h3>
                <button onclick="closeUploadModal()" style="background: none; border: none; color: var(--light-text-secondary); font-size: 20px; cursor: pointer;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p style="margin-bottom: 10px; color: var(--light-text);">点击或拖放文件到此处上传</p>
                <p style="font-size: 12px; color: var(--light-text-secondary);">支持单个文件上传，最大 25MB</p>
            </div>
            <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(this.files)">
            <div class="progress-bar" id="progress-bar" style="display: none;">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="upload-status" style="text-align: center; margin: 10px 0; font-size: 14px; color: var(--light-text);"></div>
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closeUploadModal()">取消</button>
                <button class="btn btn-primary" onclick="startUpload()" id="upload-btn" disabled>开始上传</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const GITHUB_USER = 'lanzouy';
        const GITHUB_REPO = 'lanzouy.github.io';
        const GITHUB_BRANCH = 'main';
        const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;
        
        // OAuth 配置 - 这里填你的
        const GITHUB_CLIENT_ID = 'YOUR_CLIENT_ID'; // 替换为你的 Client ID
        const GITHUB_CLIENT_SECRET = '84c047c79d8df34b0628d215c1fcf345b33e810e';
        const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
        const GITHUB_AUTH_URL = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=repo`;
        
        const FILE_ICONS = {
            'zip': 'file-archive', 'rar': 'file-archive', '7z': 'file-archive', 
            'gz': 'file-archive', 'tar': 'file-archive', 'pdf': 'file-pdf', 
            'doc': 'file-word', 'docx': 'file-word', 'txt': 'file-lines', 
            'md': 'markdown', 'xls': 'file-excel', 'xlsx': 'file-excel', 
            'ppt': 'file-powerpoint', 'pptx': 'file-powerpoint', 'jpg': 'file-image', 
            'jpeg': 'file-image', 'png': 'file-image', 'gif': 'file-image', 
            'bmp': 'file-image', 'svg': 'file-image', 'webp': 'file-image', 
            'ico': 'file-image', 'mp4': 'file-video', 'avi': 'file-video', 
            'mkv': 'file-video', 'mov': 'file-video', 'wmv': 'file-video', 
            'flv': 'file-video', 'mp3': 'file-audio', 'wav': 'file-audio', 
            'flac': 'file-audio', 'aac': 'file-audio', 'ogg': 'file-audio', 
            'js': 'file-code', 'ts': 'file-code', 'py': 'file-code', 
            'java': 'file-code', 'cpp': 'file-code', 'c': 'file-code', 
            'html': 'file-code', 'css': 'file-code', 'json': 'file-code', 
            'xml': 'file-code', 'exe': 'gear', 'msi': 'gear', 'dmg': 'apple', 
            'apk': 'mobile', 'ipa': 'mobile', 'iso': 'compact-disc', 
            'img': 'compact-disc'
        };

        // 全局状态
        let currentPath = '';
        let allItems = [];
        let fileIndex = [];
        let isIndexLoaded = false;
        let accessToken = localStorage.getItem('github_access_token');
        let selectedFile = null;
        let currentSort = { column: 'name', order: 'asc' };

        // 1. 初始化
        function init() {
            checkAuthCode();
            loadFiles('');
            setupSearch();
            initTheme();
            setupDragAndDrop();
            updateAuthUI();
            
            document.getElementById('refresh-btn').addEventListener('click', () => loadFiles(currentPath));
        }

        // 2. OAuth 登录
        function githubLogin() {
            sessionStorage.setItem('pre_auth_path', currentPath);
            window.location.href = GITHUB_AUTH_URL;
        }

        function checkAuthCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                const newUrl = window.location.pathname;
                window.history.replaceState({}, document.title, newUrl);
                exchangeCodeForToken(code);
                return true;
            }
            return false;
        }

        async function exchangeCodeForToken(code) {
            try {
                const params = new URLSearchParams();
                params.append('client_id', GITHUB_CLIENT_ID);
                params.append('client_secret', GITHUB_CLIENT_SECRET);
                params.append('code', code);
                params.append('redirect_uri', window.location.origin + window.location.pathname);
                
                const response = await fetch('https://github.com/login/oauth/access_token', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString()
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error_description || '授权失败');
                }
                
                accessToken = data.access_token;
                localStorage.setItem('github_access_token', accessToken);
                
                const savedPath = sessionStorage.getItem('pre_auth_path') || '';
                sessionStorage.removeItem('pre_auth_path');
                
                updateAuthUI();
                loadFiles(savedPath);
                showMessage('授权成功！', 'success');
                
            } catch (error) {
                console.error('授权失败:', error);
                showMessage('授权失败: ' + error.message, 'error');
            }
        }

        function githubLogout() {
            localStorage.removeItem('github_access_token');
            accessToken = null;
            updateAuthUI();
            loadFiles(currentPath);
            showMessage('已退出登录', 'info');
        }

        function updateAuthUI() {
            const loginBtn = document.getElementById('login-btn');
            if (accessToken) {
                loginBtn.innerHTML = '<i class="fab fa-github"></i> 已授权';
                loginBtn.onclick = githubLogout;
                loginBtn.classList.remove('btn-primary');
                loginBtn.classList.add('btn-outline');
            } else {
                loginBtn.innerHTML = '<i class="fab fa-github"></i> 授权登录';
                loginBtn.onclick = githubLogin;
                loginBtn.classList.remove('btn-outline');
                loginBtn.classList.add('btn-primary');
            }
        }

        // 3. 文件浏览
        async function loadFiles(path = '') {
            const contentEl = document.getElementById('content');
            const fileCountEl = document.getElementById('file-count');
            const folderCountEl = document.getElementById('folder-count');
            const totalSizeEl = document.getElementById('total-size');
            const pathTitleEl = document.getElementById('current-path-title');
            const breadcrumbEl = document.getElementById('breadcrumb');
            
            currentPath = path;
            
            try {
                contentEl.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>正在加载文件列表...</p>
                    </div>
                `;
                
                updatePageTitle(currentPath);
                updateBreadcrumb(currentPath, breadcrumbEl);
                
                const apiUrl = currentPath ? 
                    `${API_BASE}${encodeURIComponent(currentPath)}` : 
                    API_BASE;
                
                const headers = {
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'lanzouy-cloud'
                };
                
                if (accessToken) {
                    headers['Authorization'] = `token ${accessToken}`;
                }
                
                const response = await fetch(apiUrl, { headers });
                
                if (!response.ok) {
                    throw new Error(`GitHub API 请求失败: ${response.status}`);
                }
                
                const items = await response.json();
                allItems = items;

                const files = items.filter(item => 
                    item.type === 'file' && 
                    !item.name.startsWith('.') && 
                    item.name !== 'index.html'
                );
                
                const folders = items.filter(item => 
                    item.type === 'dir' && 
                    !item.name.startsWith('.')
                );
                
                // 递归计算文件夹大小
                let folderSizes = {};
                if (accessToken) {
                    for (const folder of folders) {
                        const size = await calculateFolderSize(folder.path);
                        folderSizes[folder.name] = size;
                    }
                }
                
                const fileCount = files.length;
                const folderCount = folders.length;
                const currentDirSize = files.reduce((sum, file) => sum + (file.size || 0), 0);
                const subDirSize = Object.values(folderSizes).reduce((a, b) => a + b, 0);
                const totalSize = currentDirSize + subDirSize;
                
                fileCountEl.textContent = fileCount;
                folderCountEl.textContent = folderCount;
                totalSizeEl.textContent = formatFileSize(totalSize);
                
                renderFileTable(files, folders, folderSizes, contentEl);
                
                if (!isIndexLoaded && accessToken) {
                    setTimeout(() => {
                        buildFileIndex();
                    }, 1000);
                }
                
            } catch (error) {
                contentEl.innerHTML = `
                    <div class="error">
                        <p><i class="fas fa-exclamation-triangle"></i> 加载失败</p>
                        <p style="margin-top: 10px; font-size: 14px;">${error.message}</p>
                        <button onclick="loadFiles(currentPath)" class="btn btn-primary" style="margin-top: 15px;">
                            <i class="fas fa-redo"></i> 重试
                        </button>
                    </div>
                `;
            }
        }

        async function calculateFolderSize(path) {
            if (!accessToken) return 0;
            
            try {
                const apiUrl = `${API_BASE}${encodeURIComponent(path)}`;
                const headers = {
                    'Authorization': `token ${accessToken}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'lanzouy-cloud'
                };
                
                const response = await fetch(apiUrl, { headers });
                if (!response.ok) return 0;
                
                const items = await response.json();
                let totalSize = 0;
                
                for (const item of items) {
                    if (item.name.startsWith('.')) continue;
                    
                    if (item.type === 'file') {
                        totalSize += item.size || 0;
                    } else if (item.type === 'dir') {
                        const subSize = await calculateFolderSize(`${path}/${item.name}`);
                        totalSize += subSize;
                    }
                }
                
                return totalSize;
            } catch (error) {
                console.error('计算文件夹大小失败:', error);
                return 0;
            }
        }

        // 4. 全仓库搜索索引
        async function buildFileIndex(path = '', relativePath = '') {
            if (!accessToken) return;
            
            try {
                fileIndex = [];
                isIndexLoaded = false;
                
                await indexDirectory(path, relativePath);
                isIndexLoaded = true;
                
                showMessage('搜索索引构建完成！', 'success');
            } catch (error) {
                console.error('索引构建失败:', error);
            }
        }

        async function indexDirectory(path = '', relativePath = '') {
            if (!accessToken) return;
            
            try {
                const apiUrl = path ? 
                    `${API_BASE}${encodeURIComponent(path)}` : 
                    API_BASE;
                
                const headers = {
                    'Authorization': `token ${accessToken}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'User-Agent': 'lanzouy-cloud'
                };
                
                const response = await fetch(apiUrl, { headers });
                if (!response.ok) return;
                
                const items = await response.json();
                
                for (const item of items) {
                    if (item.name.startsWith('.') || item.name === 'index.html') continue;
                    
                    const itemPath = path ? `${path}/${item.name}` : item.name;
                    const displayPath = relativePath ? `${relativePath}/${item.name}` : item.name;
                    
                    if (item.type === 'dir') {
                        fileIndex.push({
                            name: item.name,
                            type: 'dir',
                            path: itemPath,
                            displayPath: displayPath,
                            size: 0,
                            date: item.updated_at || item.created_at
                        });
                        
                        await indexDirectory(itemPath, displayPath);
                    } else {
                        fileIndex.push({
                            name: item.name,
                            type: 'file',
                            path: itemPath,
                            displayPath: displayPath,
                            size: item.size || 0,
                            date: item.updated_at || item.created_at
                        });
                    }
                }
            } catch (error) {
                console.error('索引目录失败:', error);
            }
        }

        // 5. 搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            const searchResultsContainer = document.getElementById('search-results-container');
            let searchTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    const term = this.value.trim();
                    
                    if (term === '') {
                        searchResultsContainer.style.display = 'none';
                        const rows = document.querySelectorAll('.files-table tbody tr');
                        rows.forEach(row => row.style.display = '');
                        return;
                    }
                    
                    if (isIndexLoaded && fileIndex.length > 0) {
                        performGlobalSearch(term.toLowerCase());
                    } else {
                        performLocalSearch(term.toLowerCase());
                    }
                }, 300);
            });
            
            document.addEventListener('click', function(event) {
                if (!searchInput.contains(event.target) && !searchResultsContainer.contains(event.target)) {
                    searchResultsContainer.style.display = 'none';
                }
            });
        }

        function performGlobalSearch(term) {
            const searchResultsContainer = document.getElementById('search-results-container');
            const results = fileIndex.filter(item => 
                item.name.toLowerCase().includes(term) || 
                item.displayPath.toLowerCase().includes(term)
            ).slice(0, 50);
            
            if (results.length === 0) {
                searchResultsContainer.innerHTML = `
                    <div class="search-empty">
                        <i class="fas fa-search"></i>
                        <p>未找到匹配的文件或文件夹</p>
                    </div>
                `;
                searchResultsContainer.style.display = 'block';
                return;
            }
            
            let html = '';
            results.forEach(item => {
                const iconClass = item.type === 'dir' ? 'folder' : getFileIcon(item.name);
                const size = item.type === 'dir' ? '-' : formatFileSize(item.size);
                const date = formatDate(item.date);
                const highlightedName = highlightText(item.name, term);
                const pathParts = item.displayPath.split('/');
                const folderPath = pathParts.slice(0, -1).join('/') || '根目录';
                
                html += `
                    <div class="search-result-item" onclick="navigateToSearchResult('${item.path}', '${item.type}')">
                        <div class="search-result-icon" style="background: ${item.type === 'dir' ? '#fff7e6' : '#e6f7ff'}; color: ${item.type === 'dir' ? '#ffa940' : 'var(--primary-blue)'}">
                            <i class="fas fa-${iconClass}"></i>
                        </div>
                        <div class="search-result-info">
                            <div class="search-result-name">${highlightedName}</div>
                            <div class="search-result-path">
                                <i class="fas fa-folder"></i> ${folderPath}
                            </div>
                        </div>
                        <div class="search-result-size">${size}</div>
                    </div>
                `;
            });
            
            searchResultsContainer.innerHTML = html;
            searchResultsContainer.style.display = 'block';
        }

        function performLocalSearch(term) {
            const searchResultsContainer = document.getElementById('search-results-container');
            const rows = document.querySelectorAll('.files-table tbody tr');
            let hasResults = false;
            
            rows.forEach(row => {
                const nameCell = row.querySelector('.file-name');
                if (nameCell) {
                    const fileName = nameCell.textContent.toLowerCase();
                    if (fileName.includes(term)) {
                        row.style.display = '';
                        hasResults = true;
                    } else {
                        row.style.display = 'none';
                    }
                }
            });
            
            if (!hasResults) {
                searchResultsContainer.innerHTML = `
                    <div class="search-empty">
                        <i class="fas fa-search"></i>
                        <p>当前目录未找到匹配的文件或文件夹</p>
                        ${accessToken ? '' : '<p style="font-size: 11px; margin-top: 5px; opacity: 0.7;">授权登录后可搜索全仓库</p>'}
                    </div>
                `;
                searchResultsContainer.style.display = 'block';
            } else {
                searchResultsContainer.style.display = 'none';
            }
        }

        function navigateToSearchResult(path, type) {
            const searchInput = document.getElementById('search-input');
            const searchResultsContainer = document.getElementById('search-results-container');
            
            searchInput.value = '';
            searchResultsContainer.style.display = 'none';
            
            if (type === 'dir') {
                loadFiles(path);
            } else {
                window.open(`/${path}`, '_blank');
            }
        }

        // 6. 文件上传
        function showUploadModal() {
            if (!accessToken) {
                showMessage('请先授权登录才能上传文件', 'error');
                return;
            }
            document.getElementById('upload-modal').style.display = 'flex';
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').style.display = 'none';
            resetUpload();
        }

        function setupDragAndDrop() {
            const uploadArea = document.getElementById('upload-area');
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = 'var(--primary-blue)';
                uploadArea.style.background = 'var(--primary-blue-light)';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = 'var(--light-border)';
                uploadArea.style.background = 'transparent';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = 'var(--light-border)';
                uploadArea.style.background = 'transparent';
                
                if (e.dataTransfer.files.length > 0) {
                    handleFileSelect(e.dataTransfer.files);
                }
            });
        }

        function handleFileSelect(files) {
            if (files.length === 0) return;
            
            const file = files[0];
            if (file.size > 25 * 1024 * 1024) {
                showMessage('文件大小不能超过 25MB', 'error');
                return;
            }
            
            selectedFile = file;
            document.getElementById('upload-status').innerHTML = `
                已选择: <strong>${file.name}</strong> (${formatFileSize(file.size)})
            `;
            document.getElementById('upload-btn').disabled = false;
        }

        async function startUpload() {
            if (!selectedFile || !accessToken) return;
            
            const uploadBtn = document.getElementById('upload-btn');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const uploadStatus = document.getElementById('upload-status');
            
            uploadBtn.disabled = true;
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            
            try {
                const content = await readFileAsBase64(selectedFile);
                const path = currentPath ? `${currentPath}/${selectedFile.name}` : selectedFile.name;
                
                const response = await fetch(`${API_BASE}${encodeURIComponent(path)}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${accessToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'User-Agent': 'lanzouy-cloud',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload ${selectedFile.name}`,
                        content: content,
                        branch: GITHUB_BRANCH
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '上传失败');
                }
                
                progressFill.style.width = '100%';
                uploadStatus.innerHTML = `<span style="color: var(--success)">上传成功！</span>`;
                
                setTimeout(() => {
                    closeUploadModal();
                    loadFiles(currentPath);
                }, 1000);
                
            } catch (error) {
                console.error('上传失败:', error);
                uploadStatus.innerHTML = `<span style="color: var(--danger)">上传失败: ${error.message}</span>`;
                uploadBtn.disabled = false;
            }
        }

        function resetUpload() {
            selectedFile = null;
            document.getElementById('file-input').value = '';
            document.getElementById('upload-status').textContent = '';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('upload-btn').disabled = true;
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 7. 渲染文件列表
        function renderFileTable(files, folders, folderSizes, contentEl) {
            if (files.length === 0 && folders.length === 0) {
                contentEl.innerHTML = '<div class="empty"><p>此文件夹为空</p></div>';
                return;
            }
            
            let html = `
                <table class="files-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">名称 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable('size')">大小 <i class="fas fa-sort"></i></th>
                            <th onclick="sortTable('date')">更新时间 <i class="fas fa-sort"></i></th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            if (currentPath) {
                const parentPath = getParentPath(currentPath);
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper back">
                                    <i class="fas fa-level-up-alt"></i>
                                </div>
                                <div class="file-info">
                                    <a href="javascript:void(0)" onclick="loadFiles('${parentPath}')" class="file-name">返回上级目录</a>
                                </div>
                            </div>
                        </td>
                        <td>-</td>
                        <td>-</td>
                        <td>
                            <button onclick="loadFiles('${parentPath}')" class="btn btn-outline">
                                <i class="fas fa-folder-open"></i> 打开
                            </button>
                        </td>
                    </tr>
                `;
            }
            
            folders.forEach(folder => {
                const date = formatDate(folder.updated_at || folder.created_at);
                const folderPath = currentPath ? `${currentPath}/${folder.name}` : folder.name;
                const size = folderSizes[folder.name] ? formatFileSize(folderSizes[folder.name]) : '-';
                
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper folder">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <div class="file-info">
                                    <a href="javascript:void(0)" onclick="loadFiles('${folderPath}')" class="file-name">${folder.name}</a>
                                </div>
                            </div>
                        </td>
                        <td>${size}</td>
                        <td>${date}</td>
                        <td>
                            <button onclick="loadFiles('${folderPath}')" class="btn btn-outline">
                                <i class="fas fa-folder-open"></i> 打开
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            files.forEach(file => {
                const iconClass = getFileIcon(file.name);
                const size = formatFileSize(file.size);
                const date = formatDate(file.updated_at || file.created_at);
                const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                const downloadUrl = `/${filePath}`;
                const isImage = /\.(jpg|jpeg|png|gif|bmp|webp)$/i.test(file.name);
                const isText = /\.(txt|md|js|css|html|json|xml)$/i.test(file.name);
                
                html += `
                    <tr>
                        <td>
                            <div class="file-item">
                                <div class="file-icon-wrapper file">
                                    <i class="fas fa-${iconClass}"></i>
                                </div>
                                <div class="file-info">
                                    <a href="${downloadUrl}" class="file-name" ${isImage || isText ? 'onclick="previewFile(this.href, \'' + file.name + '\'); return false;"' : 'target="_blank"'} title="${file.name}">${file.name}</a>
                                </div>
                            </div>
                        </td>
                        <td>${size}</td>
                        <td>${date}</td>
                        <td>
                            <a href="${downloadUrl}" class="btn btn-primary" download="${file.name}">
                                <i class="fas fa-download"></i> 下载
                            </a>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            contentEl.innerHTML = html;
        }

        // 8. 工具函数
        function getFileIcon(filename) {
            const ext = filename.toLowerCase().split('.').pop();
            return FILE_ICONS[ext] || 'file';
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return '-';
            }
        }

        function getParentPath(path) {
            if (!path) return '';
            const parts = path.split('/');
            parts.pop();
            return parts.join('/');
        }

        function updatePageTitle(path) {
            const pathTitleEl = document.getElementById('current-path-title');
            if (pathTitleEl) {
                pathTitleEl.textContent = path ? `当前位置: /${path}` : '全部文件';
            }
        }

        function updateBreadcrumb(path, breadcrumbEl) {
            if (!breadcrumbEl) return;
            
            let html = '<a href="javascript:void(0)" onclick="loadFiles(\'\')">全部文件</a>';
            
            if (path) {
                const parts = path.split('/');
                let currentPath = '';
                
                parts.forEach((part, index) => {
                    currentPath = currentPath ? `${currentPath}/${part}` : part;
                    html += `<span class="breadcrumb-separator">/</span>`;
                    if (index === parts.length - 1) {
                        html += `<span>${part}</span>`;
                    } else {
                        html += `<a href="javascript:void(0)" onclick="loadFiles('${currentPath}')">${part}</a>`;
                    }
                });
            }
            
            breadcrumbEl.innerHTML = html;
        }

        function sortTable(column) {
            const tbody = document.querySelector('.files-table tbody');
            if (!tbody) return;
            
            const rows = Array.from(tbody.querySelectorAll('tr'));
            
            rows.sort((a, b) => {
                const aVal = getCellValue(a, column);
                const bVal = getCellValue(b, column);
                
                let comparison = 0;
                if (column === 'size') {
                    const aSize = aVal === '-' ? -1 : parseFloat(aVal);
                    const bSize = bVal === '-' ? -1 : parseFloat(bVal);
                    comparison = aSize - bSize;
                } else if (column === 'date') {
                    const aDate = aVal === '-' ? new Date(0) : new Date(aVal);
                    const bDate = bVal === '-' ? new Date(0) : new Date(bVal);
                    comparison = aDate - bDate;
                } else {
                    comparison = aVal.localeCompare(bVal);
                }
                
                return currentSort.order === 'asc' ? comparison : -comparison;
            });
            
            rows.forEach(row => tbody.appendChild(row));
            currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
        }

        function getCellValue(row, column) {
            const cellIndex = { name: 0, size: 1, date: 2 }[column];
            const cell = row.cells[cellIndex];
            if (!cell) return '';
            const fileLink = cell.querySelector('.file-name');
            return fileLink ? fileLink.textContent.trim() : cell.textContent.trim();
        }

        function highlightText(text, term) {
            if (!term) return text;
            const regex = new RegExp(`(${term})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function previewFile(url, filename) {
            if (/\.(jpg|jpeg|png|gif|bmp|webp)$/i.test(filename)) {
                window.open(url, '_blank');
            } else {
                const modal = document.createElement('div');
                modal.innerHTML = `
                    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center;">
                        <div style="background: var(--light-card); border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
                            <div style="padding: 20px; border-bottom: 1px solid var(--light-border); display: flex; justify-content: space-between; align-items: center;">
                                <h3 style="margin: 0; color: var(--light-text);">${filename}</h3>
                                <button onclick="this.closest('div[style*=\"position: fixed\"]').remove()" style="background: none; border: none; color: var(--light-text-secondary); font-size: 20px; cursor: pointer;">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <iframe src="${url}" style="flex: 1; border: none; border-radius: 0 0 12px 12px;"></iframe>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
        }

        // 9. 主题切换
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = themeToggle.querySelector('i');
            
            const savedTheme = localStorage.getItem('lanzouy-theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeIcon.className = 'fas fa-sun';
            }
            
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                
                if (document.body.classList.contains('dark-mode')) {
                    themeIcon.className = 'fas fa-sun';
                    localStorage.setItem('lanzouy-theme', 'dark');
                } else {
                    themeIcon.className = 'fas fa-moon';
                    localStorage.setItem('lanzouy-theme', 'light');
                }
            });
        }

        // 10. 消息提示
        function showMessage(message, type = 'info') {
            const colors = {
                success: '#52c41a',
                error: '#ff4d4f',
                warning: '#faad14',
                info: 'var(--primary-blue)'
            };
            
            const messageDiv = document.createElement('div');
            messageDiv.innerHTML = `
                <div style="position: fixed; top: 20px; right: 20px; background: ${colors[type]}; color: white; padding: 12px 20px; border-radius: 6px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease-out;">
                    <i class="fas fa-${type === 'success' ? 'check' : type === 'error' ? 'exclamation' : 'info'}-circle"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => messageDiv.remove(), 300);
            }, 3000);
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                @keyframes slideOut {
                    from { transform: translateX(0); opacity: 1; }
                    to { transform: translateX(100%); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
